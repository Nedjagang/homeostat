# Foundry casting config for the SigNoz deployment.
#
# IMPORTANT: this is a TEMPLATE. Regenerate/validate it against the SigNoz Foundry
# quickstart for your version, then commit BOTH this file and the generated
# casting.yaml.lock (produced by `foundryctl forge`). Judges may re-run these to
# reproduce the deployment, so they must be real, not this placeholder.
#
# Workflow:
#   foundryctl gauge -f casting.yaml            # validate host + prerequisites
#   foundryctl forge -f casting.yaml            # generates pours/deployment/ + casting.yaml.lock
#   cd pours/deployment && docker compose up -d # start SigNoz
#
# Verify the exact schema/fields against the Foundry docs — the shape below is indicative.

apiVersion: foundry/v1
kind: Casting
target:
  platform: docker
  flavor: compose
  mode: docker
signoz:
  version: "<pin a version>"
