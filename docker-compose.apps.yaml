# ClaimPilot, dockerized separately from the SigNoz stack itself.
#
# The SigNoz stack (pours/deployment/compose.yaml, generated by `foundryctl forge`) creates
# an external `signoz-network` bridge network on first `cast`/`up`. This file joins that
# network so ClaimPilot can reach the collector at http://signoz-ingester:4318 by container
# name — no host networking, no hardcoded IPs.
#
# Usage (bring up SigNoz first — see casting.yaml for why plain `docker compose`, not
# `foundryctl cast`, is used to start it):
#   foundryctl gauge -f casting.yaml
#   foundryctl forge -f casting.yaml
#   docker compose -f pours/deployment/compose.yaml -f signoz/compose.override.yaml up -d
#   docker compose -f docker-compose.apps.yaml up --build claimpilot -d
#   docker compose -f docker-compose.apps.yaml run --rm agent   # optional one-shot batch
#
# On a host where SigNoz lives elsewhere (e.g. apps deployed next to the SigNoz VM's own
# stack), set OTEL_EXPORTER_OTLP_ENDPOINT in claimpilot/.env instead and drop the network.

networks:
  signoz-network:
    external: true

services:
  # The service: continuous claim loop + /control heal surface in ONE process.
  # /control mutates state the loop reads live — a separate one-shot agent container
  # could not be healed (its process wouldn't see the control server's state).
  claimpilot:
    build: ./claimpilot
    networks:
      - signoz-network
    env_file:
      - ./claimpilot/.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-ingester:4318
    ports:
      - "8091:8091"
    command: ["uvicorn", "control:app", "--host", "0.0.0.0", "--port", "8091"]
    restart: unless-stopped

  # One-shot batch over the sample claims (smoke tests, screenshots) — not the demo path.
  agent:
    build: ./claimpilot
    networks:
      - signoz-network
    env_file:
      - ./claimpilot/.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-ingester:4318
    command: ["python", "agent.py"]
