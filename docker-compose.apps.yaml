# ClaimPilot (agent + /control), dockerized separately from the SigNoz stack itself.
#
# The SigNoz stack (pours/deployment/compose.yaml, generated by `foundryctl forge`) creates
# an external `signoz-network` bridge network on first `cast`/`up`. This file joins that
# network so ClaimPilot can reach the collector at http://signoz-ingester:4318 by container
# name — no host networking, no hardcoded IPs.
#
# Usage (bring up SigNoz first — see casting.yaml for why plain `docker compose`, not
# `foundryctl cast`, is used to start it):
#   foundryctl gauge -f casting.yaml
#   foundryctl forge -f casting.yaml
#   docker compose -f pours/deployment/compose.yaml -f signoz/compose.override.yaml up -d
#   docker compose -f docker-compose.apps.yaml up --build control -d  # long-running /control API
#   docker compose -f docker-compose.apps.yaml run --rm agent         # one-shot batch claims demo

networks:
  signoz-network:
    external: true

services:
  agent:
    build: ./claimpilot
    networks:
      - signoz-network
    env_file:
      - ./claimpilot/.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-ingester:4318
    command: ["python", "agent.py"]

  control:
    build: ./claimpilot
    networks:
      - signoz-network
    env_file:
      - ./claimpilot/.env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-ingester:4318
    ports:
      - "8091:8091"
    command: ["uvicorn", "control:app", "--host", "0.0.0.0", "--port", "8091"]
    restart: unless-stopped
